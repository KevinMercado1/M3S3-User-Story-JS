<!doctype html>
<html lang="en">
  <head>
    <!-- Meta tags for character encoding and mobile responsiveness -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- Linking the JavaScript file; 'defer' ensures the script runs after HTML is parsed -->
    <script src="index.js" defer></script>

    <title>Manipulation DOM</title>
  </head>
  <body>
    <main>
      <!-- Page header and instructions -->
      <header>
        <h1>My Notes</h1>
        <p>Write a note and press "submit" to save it to the list.</p>
      </header>

      <!-- Form to capture new note input -->
      <form method="post">
        <label for="noteInput">New note:</label>
        <input type="text" id="noteInput" placeholder="Write your notes..." />
        <button id="btnNote">submit</button>
      </form>

      <!-- Container where the list items (li) will be dynamically injected -->
      <ul id="noteList"></ul>

      <!-- Button to trigger the removal of the last note -->
      <button id="deletebtn">Delete</button>
    </main>
  </body>
</html>
