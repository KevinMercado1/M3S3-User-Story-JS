<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="index.js" defer></script>
    <title>Manipulation DOM</title>
  </head>
  <body>
    <main>
      <header>
        <h1>My Notes</h1>
        <p>Write a note and press "submit" to save it to the list.</p>
      </header>

      <form method="post">
        <label for="noteInput">New note:</label>
        <input type="text" id="noteInput" placeholder="Write your notes..." />
        <button id="btnNote">submit</button>
      </form>
      <ul id="noteList"></ul>
      <button id="deletebtn">Delete</button>
    </main>
  </body>
</html>
